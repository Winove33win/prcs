<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" role="img" aria-label="Biblioteca jurídica com livros de direito">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#12100c"/>
      <stop offset="100%" stop-color="#0c0a08"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5e22"/>
      <stop offset="50%" stop-color="#6b4818"/>
      <stop offset="100%" stop-color="#533810"/>
    </linearGradient>
    <linearGradient id="woodH" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a5220"/>
      <stop offset="100%" stop-color="#5c3e14"/>
    </linearGradient>
    <radialGradient id="lampGlow" cx="50%" cy="0%" r="70%">
      <stop offset="0%"   stop-color="#f0c040" stop-opacity="0.45"/>
      <stop offset="40%"  stop-color="#c9a84c" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="deskGlow" cx="50%" cy="0%" r="80%">
      <stop offset="0%"   stop-color="#c9a84c" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="leather" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c3050"/>
      <stop offset="100%" stop-color="#111e38"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#1a1208"/>
      <stop offset="50%"  stop-color="#221608"/>
      <stop offset="100%" stop-color="#1a1208"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- WALL BACKGROUND -->
  <rect width="900" height="700" fill="url(#wall)"/>

  <!-- Warm ceiling lamp glow -->
  <ellipse cx="450" cy="0" rx="500" ry="260" fill="url(#lampGlow)"/>

