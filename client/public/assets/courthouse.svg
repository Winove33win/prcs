<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-label="Fachada de tribunal clássico">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#040b18"/>
      <stop offset="70%" stop-color="#0a1830"/>
      <stop offset="100%" stop-color="#0d204a"/>
    </linearGradient>
    <linearGradient id="colGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#13254a"/>
      <stop offset="25%" stop-color="#1d3466"/>
      <stop offset="75%" stop-color="#1d3466"/>
      <stop offset="100%" stop-color="#13254a"/>
    </linearGradient>
    <linearGradient id="stepGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2f52"/>
      <stop offset="100%" stop-color="#0d1e3a"/>
    </linearGradient>
    <radialGradient id="topGlow" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="doorGlow" cx="50%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="1200" height="720" fill="url(#sky)"/>

  <!-- Top atmospheric glow -->
  <ellipse cx="600" cy="0" rx="520" ry="230" fill="url(#topGlow)"/>

  <!-- Stars -->
  <circle cx="80"  cy="55"  r="1.2" fill="#fff" opacity="0.5"/>
  <circle cx="160" cy="30"  r="0.8" fill="#fff" opacity="0.4"/>
  <circle cx="270" cy="70"  r="1.4" fill="#fff" opacity="0.55"/>
  <circle cx="390" cy="25"  r="0.9" fill="#fff" opacity="0.35"/>
  <circle cx="820" cy="40"  r="1.1" fill="#fff" opacity="0.45"/>
  <circle cx="960" cy="65"  r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="1070" cy="28" r="0.8" fill="#fff" opacity="0.35"/>
  <circle cx="1150" cy="80" r="1.2" fill="#fff" opacity="0.5"/>
  <circle cx="60"   cy="170" r="0.7" fill="#fff" opacity="0.3"/>
  <circle cx="1130" cy="150" r="0.7" fill="#fff" opacity="0.3"/>
  <circle cx="470" cy="50"  r="0.6" fill="#fff" opacity="0.3"/>
  <circle cx="740" cy="20"  r="1.0" fill="#fff" opacity="0.45"/>

  <!-- Ground plane -->
  <rect x="0" y="640" width="1200" height="80" fill="#060f1e"/>

  <!-- STEPS (3 levels) -->
  <rect x="30"  y="636" width="1140" height="16" rx="1" fill="url(#stepGrad)" opacity="0.95"/>
  <rect x="50"  y="620" width="1100" height="18" rx="1" fill="url(#stepGrad)" opacity="0.9"/>
  <rect x="75"  y="603" width="1050" height="19" rx="1" fill="url(#stepGrad)" opacity="0.85"/>
  <!-- Step edges highlight -->
  <line x1="30"  y1="636" x2="1170" y2="636" stroke="#c9a84c" stroke-width="0.5" opacity="0.25"/>
  <line x1="50"  y1="620" x2="1150" y2="620" stroke="#c9a84c" stroke-width="0.5" opacity="0.2"/>
  <line x1="75"  y1="603" x2="1125" y2="603" stroke="#c9a84c" stroke-width="0.5" opacity="0.18"/>

  <!-- BUILDING BODY -->
  <rect x="100" y="270" width="1000" height="335" fill="#0e1e3a"/>
  <!-- Body subtle texture lines -->
  <line x1="100" y1="400" x2="1100" y2="400" stroke="#1a3060" stroke-width="1" opacity="0.3"/>
  <line x1="100" y1="480" x2="1100" y2="480" stroke="#1a3060" stroke-width="1" opacity="0.3"/>
  <line x1="100" y1="560" x2="1100" y2="560" stroke="#1a3060" stroke-width="1" opacity="0.3"/>

  <!-- PEDIMENT (triangle) -->
  <polygon points="600,68 1080,270 120,270" fill="#0c1b34"/>
  <!-- Pediment sides (gold edge) -->
  <polyline points="600,76 1068,270" fill="none" stroke="#c9a84c" stroke-width="1.8" opacity="0.5"/>
  <polyline points="600,76 132,270"  fill="none" stroke="#c9a84c" stroke-width="1.8" opacity="0.5"/>
  <line x1="120" y1="270" x2="1080" y2="270" stroke="#c9a84c" stroke-width="2" opacity="0.4"/>

  <!-- Scales of justice in pediment center -->
  <g transform="translate(600, 180)" opacity="0.55">
    <line x1="0" y1="-55" x2="0" y2="25"  stroke="#c9a84c" stroke-width="2.5"/>
    <polygon points="0,-62 6,-48 -6,-48" fill="#c9a84c"/>
    <line x1="-55" y1="-22" x2="55" y2="-22" stroke="#c9a84c" stroke-width="1.8"/>
    <circle cx="-55" cy="-22" r="3.5" fill="#c9a84c"/>
    <circle cx="55"  cy="-22" r="3.5" fill="#c9a84c"/>
    <line x1="-55" y1="-19" x2="-38" y2="8"  stroke="#c9a84c" stroke-width="1.2"/>
    <line x1="-72" y1="-19" x2="-55" y2="8"  stroke="#c9a84c" stroke-width="1.2"/>
    <ellipse cx="-55" cy="13"  rx="20" ry="5"  fill="none" stroke="#c9a84c" stroke-width="1.5"/>
    <path d="M -75 13 Q -55 25 -35 13" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
    <line x1="55"  y1="-19" x2="72" y2="8"  stroke="#c9a84c" stroke-width="1.2"/>
    <line x1="38"  y1="-19" x2="55" y2="8"  stroke="#c9a84c" stroke-width="1.2"/>
    <ellipse cx="55"  cy="13"  rx="20" ry="5"  fill="none" stroke="#c9a84c" stroke-width="1.5"/>
    <path d="M 35 13 Q 55 25 75 13" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
    <rect x="-12" y="25" width="24" height="5" rx="2" fill="#c9a84c"/>
    <rect x="-18" y="30" width="36" height="4" rx="2" fill="#c9a84c" opacity="0.6"/>
  </g>

  <!-- ENTABLATURE (band above columns) -->
  <rect x="108" y="263" width="984" height="15" fill="#c9a84c" opacity="0.18"/>
  <rect x="108" y="274" width="984" height="5"  fill="#c9a84c" opacity="0.12"/>

  <!-- COLUMNS (8 columns) - helper macro via repetition -->
  <!-- Col positions x: 122, 244, 366, 488, 610 (skip door), 712, 834, 956, 1022 -->
  <!-- We use 8 columns: 130, 248, 366, 484, 716, 834, 952, 1020 -->

  <!-- Column 1 -->
  <rect x="130" y="279" width="50" height="324" fill="url(#colGrad)"/>
  <ellipse cx="155" cy="279" rx="27" ry="7"  fill="#c9a84c" opacity="0.28"/>
  <ellipse cx="155" cy="603" rx="30" ry="8"  fill="#c9a84c" opacity="0.22"/>
  <rect x="124" y="598" width="62" height="6" rx="1" fill="#0e1e3a"/>
  <!-- Fluting lines on col -->
  <line x1="142" y1="280" x2="142" y2="602" stroke="#1a3060" stroke-width="1.2" opacity="0.5"/>
  <line x1="155" y1="280" x2="155" y2="602" stroke="#1a3060" stroke-width="1.2" opacity="0.5"/>
  <line x1="168" y1="280" x2="168" y2="602" stroke="#1a3060" stroke-width="1.2" opacity="0.5"/>

  <!-- Column 2 -->
  <rect x="242" y="279" width="50" height="324" fill="url(#colGrad)"/>
  <ellipse cx="267" cy="279" rx="27" ry="7"  fill="#c9a84c" opacity="0.28"/>
  <ellipse cx="267" cy="603" rx="30" ry="8"  fill="#c9a84c" opacity="0.22"/>
  <rect x="236" y="598" width="62" height="6" rx="1" fill="#0e1e3a"/>
  <line x1="254" y1="280" x2="254" y2="602" stroke="#1a3060" stroke-width="1.2" opacity="0.5"/>
  <line x1="267" y1="280" x2="267" y2="602" stroke="#1a3060" stroke-width="1.2" opacity="0.5"/>
  <line x1="280" y1="280" x2="280" y2="602" stroke="#1a3060" stroke-width="1.2" opacity="0.5"/>

  <!-- Column 3 -->
  <rect x="354" y="279" width="50" height="324" fill="url(#colGrad)"/>
  <ellipse cx="379" cy="279" rx="27" ry="7"  fill="#c9a84c" opacity="0.28"/>
  <ellipse cx="379" cy="603" rx="30" ry="8"  fill="#c9a84c" opacity="0.22"/>
  <rect x="348" y="598" width="62" height="6" rx="1" fill="#0e1e3a"/>
  <line x1="366" y1="280" x2="366" y2="602" stroke="#1a3060" stroke-width="1.2" opacity="0.5"/>
  <line x1="379" y1="280" x2="379" y2="602" stroke="#1a3060" stroke-width="1.2" opacity="0.5"/>
  <line x1="392" y1="280" x2="392" y2="602" stroke="#1a3060" stroke-width="1.2" opacity="0.5"/>

  <!-- Column 4 -->
  <rect x="466" y="279" width="50" height="324" fill="url(#colGrad)"/>
  <ellipse cx="491" cy="279" rx="27" ry="7"  fill="#c9a84c" opacity="0.28"/>
  <ellipse cx="491" cy="603" rx="30" ry="8"  fill="#c9a84c" opacity="0.22"/>
  <rect x="460" y="598" width="62" height="6" rx="1" fill="#0e1e3a"/>
  <line x1="478" y1="280" x2="478" y2="602" stroke="#1a3060" stroke-width="1.2" opacity="0.5"/>
  <line x1="491" y1="280" x2="491" y2="602" stroke="#1a3060" stroke-width="1.2" opacity="0.5"/>
  <line x1="504" y1="280" x2="504" y2="602" stroke="#1a3060" stroke-width="1.2" opacity="0.5"/>

  <!-- Column 5 -->
  <rect x="684" y="279" width="50" height="324" fill="url(#colGrad)"/>
  <ellipse cx="709" cy="279" rx="27" ry="7"  fill="#c9a84c" opacity="0.28"/>
  <ellipse cx="709" cy="603" rx="30" ry="8"  fill="#c9a84c" opacity="0.22"/>
  <rect x="678" y="598" width="62" height="6" rx="1" fill="#0e1e3a"/>
  <line x1="696" y1="280" x2="696" y2="602" stroke="#1a3060" stroke-width="1.2" opacity="0.5"/>
  <line x1="709" y1="280" x2="709" y2="602" stroke="#1a3060" stroke-width="1.2" opacity="0.5"/>
  <line x1="722" y1="280" x2="722" y2="602" stroke="#1a3060" stroke-width="1.2" opacity="0.5"/>

  <!-- Column 6 -->
  <rect x="796" y="279" width="50" height="324" fill="url(#colGrad)"/>
  <ellipse cx="821" cy="279" rx="27" ry="7"  fill="#c9a84c" opacity="0.28"/>
  <ellipse cx="821" cy="603" rx="30" ry="8"  fill="#c9a84c" opacity="0.22"/>
  <rect x="790" y="598" width="62" height="6" rx="1" fill="#0e1e3a"/>
  <line x1="808" y1="280" x2="808" y2="602" stroke="#1a3060" stroke-width="1.2" opacity="0.5"/>
  <line x1="821" y1="280" x2="821" y2="602" stroke="#1a3060" stroke-width="1.2" opacity="0.5"/>
  <line x1="834" y1="280" x2="834" y2="602" stroke="#1a3060" stroke-width="1.2" opacity="0.5"/>

  <!-- Column 7 -->
  <rect x="908" y="279" width="50" height="324" fill="url(#colGrad)"/>
  <ellipse cx="933" cy="279" rx="27" ry="7"  fill="#c9a84c" opacity="0.28"/>
  <ellipse cx="933" cy="603" rx="30" ry="8"  fill="#c9a84c" opacity="0.22"/>
  <rect x="902" y="598" width="62" height="6" rx="1" fill="#0e1e3a"/>
  <line x1="920" y1="280" x2="920" y2="602" stroke="#1a3060" stroke-width="1.2" opacity="0.5"/>
  <line x1="933" y1="280" x2="933" y2="602" stroke="#1a3060" stroke-width="1.2" opacity="0.5"/>
  <line x1="946" y1="280" x2="946" y2="602" stroke="#1a3060" stroke-width="1.2" opacity="0.5"/>

  <!-- Column 8 -->
  <rect x="1020" y="279" width="50" height="324" fill="url(#colGrad)"/>
  <ellipse cx="1045" cy="279" rx="27" ry="7"  fill="#c9a84c" opacity="0.28"/>
  <ellipse cx="1045" cy="603" rx="30" ry="8"  fill="#c9a84c" opacity="0.22"/>
  <rect x="1014" y="598" width="62" height="6" rx="1" fill="#0e1e3a"/>
  <line x1="1032" y1="280" x2="1032" y2="602" stroke="#1a3060" stroke-width="1.2" opacity="0.5"/>
  <line x1="1045" y1="280" x2="1045" y2="602" stroke="#1a3060" stroke-width="1.2" opacity="0.5"/>
  <line x1="1058" y1="280" x2="1058" y2="602" stroke="#1a3060" stroke-width="1.2" opacity="0.5"/>

  <!-- ARCHED DOOR (center) -->
  <rect x="546" y="430" width="108" height="175" fill="#07111f"/>
  <path d="M 546 430 Q 600 382 654 430" fill="#07111f"/>
  <!-- Door frame gold border -->
  <path d="M 546 430 Q 600 382 654 430" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.55"/>
  <rect x="546" y="430" width="108" height="175" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.4"/>
  <!-- Door panels -->
  <rect x="555" y="445" width="42" height="70"  rx="2" fill="#09182e" stroke="#c9a84c" stroke-width="0.5" opacity="0.7"/>
  <rect x="603" y="445" width="42" height="70"  rx="2" fill="#09182e" stroke="#c9a84c" stroke-width="0.5" opacity="0.7"/>
  <rect x="555" y="520" width="42" height="75"  rx="2" fill="#09182e" stroke="#c9a84c" stroke-width="0.5" opacity="0.6"/>
  <rect x="603" y="520" width="42" height="75"  rx="2" fill="#09182e" stroke="#c9a84c" stroke-width="0.5" opacity="0.6"/>
  <!-- Door knobs -->
  <circle cx="592" cy="562" r="4" fill="#c9a84c" opacity="0.7"/>
  <circle cx="608" cy="562" r="4" fill="#c9a84c" opacity="0.7"/>
  <!-- Door glow -->
  <ellipse cx="600" cy="603" rx="60" ry="20" fill="url(#doorGlow)"/>

  <!-- WINDOWS left side -->
  <!-- Arched window left 1 -->
  <rect x="190" y="340" width="72" height="110" fill="#07111f"/>
  <path d="M 190 340 Q 226 308 262 340" fill="#07111f"/>
  <path d="M 190 340 Q 226 308 262 340" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.4"/>
  <rect x="190" y="340" width="72" height="110" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.3"/>
  <!-- Window inner glow -->
  <rect x="194" y="345" width="64" height="100" fill="#0a1830" opacity="0.8"/>
  <line x1="226" y1="345" x2="226" y2="445" stroke="#c9a84c" stroke-width="0.5" opacity="0.3"/>
  <line x1="194" y1="392" x2="258" y2="392" stroke="#c9a84c" stroke-width="0.5" opacity="0.3"/>

  <!-- Arched window left 2 -->
  <rect x="190" y="490" width="72" height="105" fill="#07111f"/>
  <path d="M 190 490 Q 226 462 262 490" fill="#07111f"/>
  <path d="M 190 490 Q 226 462 262 490" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.35"/>
  <rect x="190" y="490" width="72" height="105" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.28"/>
  <rect x="194" y="495" width="64" height="95" fill="#0a1830" opacity="0.8"/>
  <line x1="226" y1="495" x2="226" y2="590" stroke="#c9a84c" stroke-width="0.5" opacity="0.3"/>

  <!-- WINDOWS right side -->
  <rect x="938" y="340" width="72" height="110" fill="#07111f"/>
  <path d="M 938 340 Q 974 308 1010 340" fill="#07111f"/>
  <path d="M 938 340 Q 974 308 1010 340" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.4"/>
  <rect x="938" y="340" width="72" height="110" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.3"/>
  <rect x="942" y="345" width="64" height="100" fill="#0a1830" opacity="0.8"/>
  <line x1="974" y1="345" x2="974" y2="445" stroke="#c9a84c" stroke-width="0.5" opacity="0.3"/>
  <line x1="942" y1="392" x2="1006" y2="392" stroke="#c9a84c" stroke-width="0.5" opacity="0.3"/>

  <rect x="938" y="490" width="72" height="105" fill="#07111f"/>
  <path d="M 938 490 Q 974 462 1010 490" fill="#07111f"/>
  <path d="M 938 490 Q 974 462 1010 490" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.35"/>
  <rect x="938" y="490" width="72" height="105" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.28"/>
  <rect x="942" y="495" width="64" height="95" fill="#0a1830" opacity="0.8"/>
  <line x1="974" y1="495" x2="974" y2="590" stroke="#c9a84c" stroke-width="0.5" opacity="0.3"/>

  <!-- TORCHES / LAMP POSTS flanking the door -->
  <rect x="525" y="530" width="6" height="80"  fill="#c9a84c" opacity="0.35"/>
  <ellipse cx="528" cy="528" rx="8" ry="12" fill="#c9a84c" opacity="0.25"/>
  <ellipse cx="528" cy="524" rx="5"  ry="8"  fill="#c9a84c" opacity="0.5"/>
  <ellipse cx="528" cy="518" rx="12" ry="18" fill="#c9a84c" opacity="0.07" filter="url(#soft)"/>

  <rect x="669" y="530" width="6" height="80"  fill="#c9a84c" opacity="0.35"/>
  <ellipse cx="672" cy="528" rx="8" ry="12" fill="#c9a84c" opacity="0.25"/>
  <ellipse cx="672" cy="524" rx="5"  ry="8"  fill="#c9a84c" opacity="0.5"/>
  <ellipse cx="672" cy="518" rx="12" ry="18" fill="#c9a84c" opacity="0.07" filter="url(#soft)"/>

  <!-- Ground reflection / foreground fog -->
  <rect x="0" y="680" width="1200" height="40" fill="#04090f" opacity="0.6"/>
</svg>
